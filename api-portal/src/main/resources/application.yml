spring:
  application:
    name: api-portal

  datasource:
    url: jdbc:postgresql://localhost:5432/practice_db
    username: ${DB_USERNAME:practice_user}
    password: ${DB_PASSWORD:practice_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: practice-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000      # 20s
      idle-timeout: 300000           # 5 min
      max-lifetime: 600000           # 10 min
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate             # Flyway manages schema — Hibernate only validates
    show-sql: false
    open-in-view: false              # Disable OSIV — best practice for Hexagonal
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:H8flTGx/75hhg9ywhjO8x1v/dqRkW2fOxAarfyPzlrc=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

auth:
  email-verification:
    expiration-hours: 48
  messaging:
    user-registered:
      exchange:    auth.exchange
      routing-key: user.registered
