services:

  postgres:
    image: postgres:16-alpine
    container_name: practice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice_db
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: practice-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practice-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/practice_db
      DB_USERNAME: practice_user
      DB_PASSWORD: practice_pass
      JWT_SECRET: H8flTGx/75hhg9ywhjO8x1v/dqRkW2fOxAarfyPzlrc=
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
