services:

  postgres:
    image: postgres:16-alpine
    container_name: practice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice_db
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: practice-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
