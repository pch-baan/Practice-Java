services:

  postgres:
    image: postgres:16-alpine
    container_name: practice-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice_db
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ 3-node cluster ──────────────────────────────────────────────
  # Erlang cookie must be identical across all nodes (cluster auth mechanism).
  # rabbitmq1 starts first; rabbitmq2 and rabbitmq3 join once rabbitmq1 is healthy.
  # Management UI available on each node: 15672 / 15673 / 15674.

  rabbitmq1:
    image: rabbitmq:4-management-alpine
    hostname: rabbitmq1
    container_name: practice-rabbitmq1
    restart: unless-stopped
    environment:
      RABBITMQ_ERLANG_COOKIE: "PRACTICE_ERLANG_COOKIE"
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /dev
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq1_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq2:
    image: rabbitmq:4-management-alpine
    hostname: rabbitmq2
    container_name: practice-rabbitmq2
    restart: unless-stopped
    environment:
      RABBITMQ_ERLANG_COOKIE: "PRACTICE_ERLANG_COOKIE"
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /dev
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq2_data:/var/lib/rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq3:
    image: rabbitmq:4-management-alpine
    hostname: rabbitmq3
    container_name: practice-rabbitmq3
    restart: unless-stopped
    environment:
      RABBITMQ_ERLANG_COOKIE: "PRACTICE_ERLANG_COOKIE"
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /dev
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq3_data:/var/lib/rabbitmq
    ports:
      - "5674:5672"
      - "15674:15672"
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: practice-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

